platforms:
  api_server:
    extra:
      host: 0.0.0.0

terminal:
  backend: "local"
  cwd: "/home/agent"

model:
  default: gpt-5.4-mini
  provider: openai-codex
  base_url: https://chatgpt.com/backend-api/codex

streaming:
  enabled: true
  transport: edit
  edit_interval: 1.0
  buffer_threshold: 40
  cursor: " ▉"
